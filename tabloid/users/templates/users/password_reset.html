{% extends "base.html" %}
{% block content %}
  <h2>Забыли пароль? </h2>
  <p>Введите email, к которому привязан ваш аккаунт. Мы отправим ссылку для сброса пароля.</p>

  <form method="post" style="max-width:400px;">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
      Отправить ссылку
    </button>
  </form>
{% endblock %}
